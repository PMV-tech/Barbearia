<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <h2 style="color:var(--gold)">Painel do Barbeiro</h2>
        
        <div class="stats-grid">
            <div class="card-stat"><h4>A Receber</h4><p id="totalP">R$ 0</p></div>
            <div class="card-stat"><h4>Faturamento</h4><p id="totalC">R$ 0</p></div>
        </div>

        <button id="cal-toggle" class="btn-cal-toggle" onclick="toggleCalAdmin()">Abrir calendário</button>

        <div id="cal-area-admin" style="display:none;">
            <div class="calendar-box">
                <div class="cal-header">
                    <button onclick="moveMonthAdmin(-1)" style="background:none; border:none; color:white">◀</button>
                    <span id="monthYearAdmin" style="text-transform: capitalize;"></span>
                    <button onclick="moveMonthAdmin(1)" style="background:none; border:none; color:white">▶</button>
                </div>
                <div class="cal-grid" id="grid-admin"></div>
            </div>
        </div>

        <div class="tab-nav">
            <button id="tab-agenda" class="tab-btn active" onclick="setTab('agenda')">Agendados (todos)</button>
            <button id="tab-his" class="tab-btn" onclick="setTab('historico')">Histórico de cortes</button>
        </div>

        <div id="lista-admin"></div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
